apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: slm-inference-hpa
  namespace: slm-rl-demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: slm-inference
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
